<!DOCTYPE html>
<html>
<head>
    <title>Schema Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .form-switch .form-check-input {
            width: 3em;
            height: 1.5em;
        }
        .description-box {
            min-height: 150px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">AI-Powered Database Schema Designer</h1>
        
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-card-text"></i> Application Description
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Describe your application in detail:</label>
                        <textarea name="description" class="form-control description-box" rows="5" placeholder="Example: An ecommerce platform with customers, orders, products, and reviews. Customers can place multiple orders, each order contains multiple products, and products can be reviewed by customers..."></textarea>
                        <div class="form-text">Be as specific as possible for better results</div>
                    </div>
                </div>
            </div>
            
            <div class="d-grid gap-2">
                <button type="submit" name="generate_schema" class="btn btn-primary btn-lg">
                    <i class="bi bi-magic"></i> Generate Schema
                </button>
            </div>
        </form>
    </div>
</body>
</html>
